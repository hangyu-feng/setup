global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Scaphandre on Proxmox host (RAPL power metrics)
  - job_name: scaphandre
    fallback_scrape_protocol: PrometheusText0.0.4
    static_configs:
      - targets: ["10.0.0.254:8080"]
        labels:
          host: diu

  # cAdvisor — per-container metrics
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # Node exporter — gameserver VM metrics
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          host: gameserver
